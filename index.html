<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Yo Me Voy Excursiones</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --sun: #FF6B35;
  --sky: #00B4D8;
  --sea: #0077B6;
  --sand: #FFD166;
  --lime: #06D6A0;
  --rose: #EF476F;
  --white: #FFFFFF;
  --soft: #F8FAFF;
  --gray: #64748B;
  --dark: #1E293B;
  --card-bg: #FFFFFF;
  --page-bg: #F0F4FF;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--page-bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.app { width: 100%; max-width: 430px; min-height: 100vh; position: relative; }

/* ── HEADER ─────────────────────────────────── */
.header {
  background: linear-gradient(135deg, var(--sun) 0%, #FF8C42 50%, var(--sand) 100%);
  padding: 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(255,107,53,0.3);
}
.header-main {
  padding: 16px 16px 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.brand-row { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.25);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  backdrop-filter: blur(10px);
}
.brand-name { font-family: 'Righteous', cursive; font-size: 18px; color: white; line-height: 1; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.85); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.header-stats {
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 8px 14px;
  text-align: right;
}
.stat-big { font-family: 'Righteous', cursive; font-size: 20px; color: white; line-height: 1; }
.stat-small { font-size: 9px; color: rgba(255,255,255,0.85); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

/* SYNC */
.sync-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px; padding: 3px 10px;
  font-size: 10px; color: white; font-weight: 700;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: white; }
.sync-dot.online { background: var(--lime); box-shadow: 0 0 6px var(--lime); }
.sync-dot.syncing { background: var(--sand); animation: blink .7s infinite; }
.sync-dot.error { background: var(--rose); }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SELLER TABS */
.seller-tabs {
  display: flex; gap: 6px; padding: 8px 14px;
}
.seller-tab {
  flex: 1; padding: 7px 6px; border: none; border-radius: 20px;
  font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800;
  cursor: pointer; transition: all .2s;
  background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.85);
}
.seller-tab.active {
  background: white; color: var(--sun); box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

/* TRIPS ACCORDION */
.trips-accord {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.2);
}
.trips-toggle-btn {
  width: 100%; background: none; border: none; color: white;
  padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800;
  cursor: pointer; letter-spacing: .5px;
}
.trips-toggle-btn span:last-child { transition: transform .3s; }
.trips-toggle-btn.open span:last-child { transform: rotate(180deg); }
.trips-dropdown { max-height: 0; overflow: hidden; transition: max-height .35s ease; background: white; }
.trips-dropdown.open { max-height: 600px; overflow-y: auto; }
.trip-row {
  padding: 11px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #F0F4FF; cursor: pointer; transition: background .15s;
}
.trip-row:active { background: #F8FAFF; }
.trip-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.trip-row-dest { font-size: 13px; font-weight: 700; color: var(--dark); flex: 1; }
.trip-row-date { font-size: 10px; color: var(--gray); font-weight: 600; }
.trip-row-price { font-size: 14px; font-weight: 900; color: var(--sun); }

/* NAV BAR */
.nav-bar {
  background: white; display: flex;
  border-top: 2px solid #F0F4FF;
}
.nav-item {
  flex: 1; padding: 10px 4px 8px; border: none; background: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; transition: all .2s; color: #94A3B8; font-family: 'Nunito', sans-serif;
}
.nav-item .nav-icon { font-size: 20px; transition: transform .2s; }
.nav-item .nav-label { font-size: 9px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
.nav-item.active { color: var(--sun); }
.nav-item.active .nav-icon { transform: scale(1.15); }

/* ── CONTENT ────────────────────────────────── */
.content { padding: 16px 14px 100px; animation: fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* SECTION HEADER */
.sec-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px; margin-top: 6px;
}
.sec-icon { font-size: 20px; }
.sec-title { font-size: 16px; font-weight: 900; color: var(--dark); }
.sec-badge {
  background: var(--sun); color: white; border-radius: 20px;
  padding: 2px 8px; font-size: 10px; font-weight: 800; margin-left: auto;
}

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.stat-card {
  border-radius: 16px; padding: 14px 14px 12px;
  display: flex; flex-direction: column;
  box-shadow: 0 4px 15px rgba(0,0,0,.08);
  transition: transform .15s;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: attr(data-emoji);
  position: absolute; right: -4px; bottom: -4px;
  font-size: 44px; opacity: .15;
}
.stat-card:active { transform: scale(.97); }
.stat-card-num { font-family: 'Righteous', cursive; font-size: 26px; color: white; line-height: 1; }
.stat-card-label { font-size: 10px; color: rgba(255,255,255,.85); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-top: 4px; }

/* TRIP CARDS */
.trip-card {
  background: white; border-radius: 18px; padding: 14px;
  margin-bottom: 12px; cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,.06);
  transition: all .2s; position: relative; overflow: hidden;
  border: 2px solid transparent;
}
.trip-card:active { transform: scale(.98); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.trip-card-accent {
  position: absolute; top: 0; left: 0; width: 5px; height: 100%;
  border-radius: 2px 0 0 2px;
}
.trip-card-inner { padding-left: 10px; }
.trip-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.trip-card-dest { font-size: 15px; font-weight: 900; color: var(--dark); }
.trip-card-date { font-size: 11px; font-weight: 600; color: var(--gray); margin-top: 2px; }
.trip-card-info { font-size: 10px; color: #94A3B8; margin-top: 3px; font-weight: 600; }
.trip-card-prices { text-align: right; flex-shrink: 0; }
.trip-card-price { font-family: 'Righteous', cursive; font-size: 20px; }
.trip-card-child { font-size: 10px; color: var(--gray); font-weight: 600; }
.trip-card-bar { background: #F0F4FF; border-radius: 20px; height: 6px; margin-top: 10px; overflow: hidden; }
.trip-card-fill { height: 6px; border-radius: 20px; transition: width .5s; }
.trip-card-stats { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.trip-card-stat-txt { font-size: 10px; color: var(--gray); font-weight: 600; }
.trip-card-badge {
  border-radius: 20px; padding: 3px 10px;
  font-size: 10px; font-weight: 800;
}

/* BUTTONS */
.btn-primary {
  background: linear-gradient(135deg, var(--sun), #FF8C42);
  color: white; border: none; border-radius: 14px;
  padding: 14px 20px; font-size: 15px; font-weight: 800;
  font-family: 'Nunito', sans-serif; cursor: pointer;
  width: 100%; margin-top: 12px;
  box-shadow: 0 4px 15px rgba(255,107,53,.35);
  transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:active { transform: scale(.97); }
.btn-secondary {
  background: var(--soft); color: var(--dark); border: 2px solid #E2E8F0;
  border-radius: 14px; padding: 12px 18px; font-size: 14px; font-weight: 800;
  font-family: 'Nunito', sans-serif; cursor: pointer;
  width: 100%; margin-top: 8px; transition: all .2s;
}
.btn-green { background: linear-gradient(135deg,var(--lime),#05B58A); color:white; border:none; border-radius:12px; padding:11px 14px; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; flex:1; transition:all .2s; box-shadow:0 3px 10px rgba(6,214,160,.3); }
.btn-red { background: linear-gradient(135deg,var(--rose),#C13554); color:white; border:none; border-radius:12px; padding:11px 14px; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; flex:1; transition:all .2s; box-shadow:0 3px 10px rgba(239,71,111,.3); }
.btn-amber { background: linear-gradient(135deg,var(--sand),#FFBA08); color:var(--dark); border:none; border-radius:12px; padding:11px 14px; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; flex:1; transition:all .2s; }
.btn-purple { background: linear-gradient(135deg,#7C3AED,#A855F7); color:white; border:none; border-radius:12px; padding:11px 14px; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; flex:1; transition:all .2s; }
.btn-sky { background: linear-gradient(135deg,var(--sky),var(--sea)); color:white; border:none; border-radius:12px; padding:11px 14px; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; flex:1; transition:all .2s; }
.action-row { display: flex; gap: 7px; margin-top: 12px; }

/* BACK BTN */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: white; border: none; border-radius: 20px;
  padding: 7px 14px; font-size: 13px; font-weight: 800;
  font-family: 'Nunito', sans-serif; color: var(--dark);
  cursor: pointer; margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* CARDS */
.info-card {
  background: white; border-radius: 16px; padding: 14px;
  margin-bottom: 12px; box-shadow: 0 3px 12px rgba(0,0,0,.06);
}
.info-card-title { font-size: 10px; font-weight: 800; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.divider { height: 1px; background: #F0F4FF; margin: 12px 0; }

/* FORM ELEMENTS */
.form-label { font-size: 12px; font-weight: 800; color: var(--dark); letter-spacing: .3px; margin-bottom: 7px; display: block; }
.form-input {
  background: var(--soft); border: 2px solid #E2E8F0;
  border-radius: 12px; padding: 12px 14px; color: var(--dark);
  font-size: 14px; width: 100%; font-family: 'Nunito', sans-serif;
  font-weight: 600; outline: none; transition: border .2s;
}
.form-input:focus { border-color: var(--sun); background: white; }
.form-textarea {
  background: var(--soft); border: 2px solid #E2E8F0;
  border-radius: 12px; padding: 12px 14px; color: var(--dark);
  font-size: 13px; width: 100%; font-family: 'Nunito', sans-serif;
  font-weight: 600; outline: none; resize: vertical; min-height: 75px;
  transition: border .2s;
}
.form-textarea:focus { border-color: var(--sun); background: white; }
.form-group { margin-bottom: 13px; }

/* OPTION GRIDS */
.options-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.options-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.options-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 7px; }
.option-card {
  background: var(--soft); border: 2.5px solid #E2E8F0;
  border-radius: 13px; padding: 11px 8px; text-align: center;
  cursor: pointer; transition: all .2s;
}
.option-card:active { transform: scale(.95); }
.option-card.selected {
  background: linear-gradient(135deg,#FFF5F0,#FFE8E0);
  border-color: var(--sun);
  box-shadow: 0 3px 10px rgba(255,107,53,.2);
}
.option-icon { font-size: 22px; margin-bottom: 4px; }
.option-name { font-size: 11px; font-weight: 800; color: var(--dark); }
.option-sub { font-size: 9px; color: var(--gray); font-weight: 600; margin-top: 1px; }
.option-card.selected .option-name { color: var(--sun); }

/* BUS CARDS */
.bus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.bus-card {
  background: white; border: 2.5px solid #E2E8F0;
  border-radius: 16px; padding: 16px 12px; text-align: center;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 3px 10px rgba(0,0,0,.05);
}
.bus-card.selected {
  border-color: var(--sun);
  background: linear-gradient(135deg,#FFF5F0,#FFE8E0);
  box-shadow: 0 4px 15px rgba(255,107,53,.25);
}
.bus-card:active { transform: scale(.97); }
.bus-emoji { font-size: 32px; margin-bottom: 6px; }
.bus-name { font-size: 16px; font-weight: 900; color: var(--dark); }
.bus-seats { font-size: 11px; font-weight: 600; color: var(--gray); margin-top: 2px; }
.bus-free { font-size: 12px; font-weight: 800; color: var(--lime); margin-top: 4px; }
.bus-taken { font-size: 10px; font-weight: 700; color: var(--sun); }

/* SEAT MAP */
.seat-map-header { text-align: center; margin-bottom: 12px; }
.seat-map-title { font-size: 15px; font-weight: 900; color: var(--dark); }
.seat-map-sub { font-size: 11px; font-weight: 600; color: var(--gray); margin-top: 2px; }
.seat-map-hint { font-size: 11px; font-weight: 700; color: var(--sun); margin-top: 3px; }
.bus-visual-front {
  background: linear-gradient(135deg, var(--sky), var(--sea));
  border-radius: 20px 20px 6px 6px; padding: 9px;
  text-align: center; font-size: 11px; font-weight: 800;
  color: white; letter-spacing: 2px; margin-bottom: 3px;
  box-shadow: 0 4px 12px rgba(0,119,182,.3);
}
.bus-visual-body {
  background: white; border: 2px solid #E2E8F0;
  border-radius: 6px 6px 16px 16px; padding: 12px 10px;
  max-height: 44vh; overflow-y: auto;
  box-shadow: 0 4px 15px rgba(0,0,0,.06);
}
.seat-row { display: grid; grid-template-columns: 1fr 1fr 18px 1fr 1fr; gap: 5px; margin-bottom: 5px; }
.seat {
  border-radius: 8px; padding: 8px 2px; text-align: center;
  font-size: 10px; font-weight: 800; cursor: pointer;
  border: 2px solid; transition: all .15s;
  font-family: 'Nunito', sans-serif;
}
.seat.free { background: var(--soft); border-color: #CBD5E1; color: var(--gray); }
.seat.free:active { background: #FFF5F0; border-color: var(--sun); }
.seat.occupied { background: #FEE2E2; border-color: #FECACA; color: #FCA5A5; cursor: not-allowed; }
.seat.selected { background: linear-gradient(135deg,var(--sun),#FF8C42); border-color: var(--sun); color: white; box-shadow: 0 2px 8px rgba(255,107,53,.4); transform: scale(1.05); }
.seat-legend { display: flex; gap: 12px; justify-content: center; margin-top: 10px; font-size: 10px; font-weight: 700; color: var(--gray); }
.seat-legend span { display: flex; align-items: center; gap: 4px; }

/* SELECTED SEATS */
.selected-seats-box {
  background: linear-gradient(135deg,#FFF5F0,#FFE8E0);
  border: 2px solid var(--sun); border-radius: 14px;
  padding: 12px 14px; margin-top: 12px;
}
.selected-seats-title { font-size: 11px; font-weight: 800; color: var(--sun); margin-bottom: 8px; }
.seats-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.seat-chip {
  background: var(--sun); color: white; border-radius: 8px;
  padding: 4px 10px; font-size: 12px; font-weight: 800;
}

/* PAYMENT BOX */
.senal-card {
  background: linear-gradient(135deg,#FFF9E6,#FFF3CC);
  border: 2px solid var(--sand); border-radius: 16px;
  padding: 14px; margin-bottom: 12px;
}
.senal-card-title { font-size: 11px; font-weight: 800; color: #B45309; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 10px; }
.senal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.senal-amount { font-family: 'Righteous', cursive; font-size: 28px; color: #B45309; }
.metalico-card {
  background: linear-gradient(135deg,#ECFDF5,#D1FAE5);
  border: 2px solid #6EE7B7; border-radius: 16px;
  padding: 14px; margin-top: 10px;
}
.metalico-card-title { font-size: 11px; font-weight: 800; color: #065F46; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
.metalico-amount { font-family: 'Righteous', cursive; font-size: 32px; color: #059669; }

/* SALES LIST */
.sale-card {
  background: white; border-radius: 16px; padding: 13px 14px;
  margin-bottom: 10px; cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,.06);
  transition: all .15s; display: flex; align-items: center; gap: 12px;
  border-left: 4px solid transparent;
}
.sale-card:active { transform: scale(.98); }
.sale-card.pagado { border-left-color: var(--lime); }
.sale-card.pendiente { border-left-color: var(--sand); }
.sale-card.cancelado { border-left-color: var(--rose); opacity: .7; }
.sale-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.sale-info { flex: 1; min-width: 0; }
.sale-name { font-size: 14px; font-weight: 800; color: var(--dark); }
.sale-dest { font-size: 11px; font-weight: 600; color: var(--gray); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sale-meta { display: flex; gap: 5px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.sale-amounts { text-align: right; flex-shrink: 0; }
.sale-senal { font-size: 13px; font-weight: 900; color: var(--sun); }
.sale-resto { font-size: 11px; font-weight: 700; color: #059669; }

/* BADGES */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  border-radius: 20px; padding: 2px 8px;
  font-size: 10px; font-weight: 800;
}
.badge-pagado { background: #DCFCE7; color: #16A34A; }
.badge-pendiente { background: #FEF9C3; color: #CA8A04; }
.badge-cancelado { background: #FEE2E2; color: #DC2626; }
.badge-jose { background: #DBEAFE; color: #2563EB; }
.badge-cris { background: #F3E8FF; color: #9333EA; }
.badge-seats { background: #F0F4FF; color: var(--sea); }

/* FILTERS */
.filter-scroll { display: flex; gap: 7px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-pill {
  white-space: nowrap; border-radius: 20px; padding: 6px 13px;
  font-size: 11px; font-weight: 800; cursor: pointer; border: none;
  font-family: 'Nunito', sans-serif; transition: all .15s;
  background: white; color: var(--gray);
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.filter-pill.active { background: var(--sun); color: white; box-shadow: 0 3px 10px rgba(255,107,53,.3); }

/* DETAIL PAGE */
.detail-hero {
  border-radius: 18px; padding: 18px;
  margin-bottom: 12px; position: relative; overflow: hidden;
  color: white;
}
.detail-hero::before {
  content: ""; position: absolute; top: -20px; right: -20px;
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(255,255,255,.1);
}
.detail-localizador { font-size: 11px; font-weight: 800; opacity: .8; letter-spacing: 1px; }
.detail-name { font-size: 22px; font-weight: 900; margin-top: 4px; }
.detail-contact { font-size: 12px; font-weight: 600; opacity: .9; margin-top: 3px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.detail-item { background: rgba(255,255,255,.15); border-radius: 10px; padding: 9px 11px; }
.detail-item-key { font-size: 9px; font-weight: 800; opacity: .8; letter-spacing: 1px; text-transform: uppercase; }
.detail-item-val { font-size: 13px; font-weight: 800; margin-top: 2px; }

/* PROFILE */
.profile-hero {
  border-radius: 20px; padding: 22px 18px; margin-bottom: 14px;
  text-align: center; color: white; position: relative; overflow: hidden;
}
.profile-hero::after { content:""; position:absolute; bottom:-30px; left:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.08); }
.profile-avatar-big { font-size: 52px; margin-bottom: 8px; }
.profile-hero-name { font-family: 'Righteous', cursive; font-size: 24px; }

];

};

// ── STATE ─────────────────────────────────────────────────
var sales={}, currentView="dashboard", currentSeller="all";
var selTrip=null,selBus=null,selSeats=[],selPayment="Bizum",selPriceType="adulto",selDeparture=null,sellerForm="jose";
var filterTrip="all",filterStatus="all",filterSeller="all",detailKey=null,tripsOpen=false;

// ── HELPERS ───────────────────────────────────────────────
function getTrip(id){return TRIPS.find(function(t){return t.id===id;});}
function getBus(id){return BUSES.find(function(b){return b.id===id;});}
function salesArr(){return Object.keys(sales).map(function(k){var s=Object.assign({},sales[k]);s._key=k;return s;}).sort(function(a,b){return (b.ts||0)-(a.ts||0);});}
function occupied(tripId,busId){return salesArr().filter(function(s){return s.tripId===tripId&&s.busId===busId&&s.status!=="Cancelado";}).reduce(function(a,s){var ss=Array.isArray(s.seats)?s.seats:[s.seat];return a.concat(ss);},[]);}
function stBadge(s){if(s==="Pagado")return'<span class="badge badge-pagado">✓ Pagado</span>';if(s==="Pendiente")return'<span class="badge badge-pendiente">⏳ Pendiente</span>';return'<span class="badge badge-cancelado">✕ Cancelado</span>';}
function selBadge(s){if(s==="jose")return'<span class="badge badge-jose">🔵 Jose</span>';if(s==="cris")return'<span class="badge badge-cris">🟣 Cris</span>';return"";}
function fmtD(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function getD(k){return DEPARTURES.find(function(d){return d.id===k;})||{full:k,icon:"📍",name:k};}
function syncUI(st,txt){var d=document.getElementById("syncDot"),t=document.getElementById("syncTxt");if(d)d.className="sync-dot "+st;if(t)t.textContent=txt||st;}
function updateRevenue(){var arr=salesArr();if(currentSeller!=="all")arr=arr.filter(function(s){return s.seller===currentSeller;});var t=arr.filter(function(s){return s.status!=="Cancelado";}).reduce(function(a,s){return a+(s.senal||0);},0);var el=document.getElementById("totalRevenue");if(el)el.textContent="€"+t;}
function toast(msg,type){var t=document.createElement("div");t.className="toast";t.style.background=type==="error"?"#EF4444":type==="warn"?"#F59E0B":"#10B981";t.innerHTML=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity="0";t.style.transition="opacity .4s";setTimeout(function(){t.remove();},400);},3000);}
function getFormVals(){var o={};["fClient","fPhone","fEmail","fSenal","fObs"].forEach(function(id){var el=document.getElementById(id);if(el)o[id]=el.value;});return o;}
function setFormVals(o){Object.keys(o).forEach(function(id){var el=document.getElementById(id);if(el)el.value=o[id];});}

// ── FIREBASE ─────────────────────────────────────────────
salesRef.on("value",function(snap){sales=snap.val()||{};syncUI("online","En línea ✓");updateRevenue();render();},function(){syncUI("error","Sin conexión");render();});

// ── SELLER ────────────────────────────────────────────────
function setSeller(s){
  currentSeller=s;
  document.querySelectorAll(".seller-tab").forEach(function(b){b.classList.remove("active");});
  var ids={all:"sbAll",jose:"sbJose",cris:"sbCris"};
  var el=document.getElementById(ids[s]);if(el)el.classList.add("active");

}

// ── TRIPS ACCORDION ───────────────────────────────────────
function buildTripsList(){
  var html="";
  TRIPS.forEach(function(t){
    var cp=t.prices.nino?' / <span style="color:#94A3B8">Niños €'+t.prices.nino+'</span>':"";
    html+='<div class="trip-row" onclick="pickTrip('+t.id+')">'
      +'<div class="trip-color-dot" style="background:'+t.color+'"></div>'
      +'<div style="flex:1"><div class="trip-row-dest">'+t.emoji+' '+t.dest+'</div><div class="trip-row-date">'+t.day+' '+fmtD(t.date)+'</div></div>'
      +'<div style="text-align:right"><div class="trip-row-price">€'+t.prices.adulto+'</div>'+cp+'</div>'
      +'</div>';
  });

}
function toggleTrips(){
  tripsOpen=!tripsOpen;

  if(btn){btn.innerHTML=tripsOpen?'<span>🗺️ Cerrar viajes</span><span>▲</span>':'<span>🗺️ Ver todos los viajes</span><span>▼</span>';}

function pickTrip(id){selTrip=getTrip(id);selBus=null;selSeats=[];selPriceType="adulto";selDeparture=null;if(tripsOpen)toggleTrips();showView("busSelect",true);}

function showView(view,hideNav){
  currentView=view;

    nav.style.display=hideNav?"none":"flex";
    if(!hideNav){var btns=nav.querySelectorAll(".nav-item");["dashboard","newSale","sales","profile"].forEach(function(v,i){btns[i].classList.toggle("active",v===view);});}
  }
  render();updateRevenue();
}
function render(){
  var c=document.getElementById("content");if(!c)return;

}

// ── DASHBOARD ────────────────────────────────────────────
function renderDashboard(){
  var arr=salesArr();
  if(currentSeller!=="all")arr=arr.filter(function(s){return s.seller===currentSeller;});
  var totalSenal=arr.filter(function(s){return s.status!=="Cancelado";}).reduce(function(a,s){return a+(s.senal||0);},0);
  var totalMet=arr.filter(function(s){return s.status!=="Cancelado";}).reduce(function(a,s){return a+(s.metalico||0);},0);
  var pending=arr.filter(function(s){return s.status==="Pendiente";}).length;
  var total=arr.filter(function(s){return s.status!=="Cancelado";}).length;
  var who=currentSeller==="all"?"General":currentSeller==="jose"?"Jose Ariel":"Cris";
  var html='<div class="sec-header"><span class="sec-icon">📊</span><span class="sec-title">Panel '+who+'</span></div>'
    +'<div class="stats-grid">'
    +'<div class="stat-card" data-emoji="💰" style="background:linear-gradient(135deg,#FF6B35,#FF8C42)"><div class="stat-card-num">€'+totalSenal+'</div><div class="stat-card-label">Total señales</div></div>'
    +'<div class="stat-card" data-emoji="💵" style="background:linear-gradient(135deg,#06D6A0,#05B58A)"><div class="stat-card-num">€'+totalMet+'</div><div class="stat-card-label">Pdte. metálico</div></div>'
    +'<div class="stat-card" data-emoji="🎫" style="background:linear-gradient(135deg,#00B4D8,#0077B6)"><div class="stat-card-num">'+total+'</div><div class="stat-card-label">Reservas</div></div>'
    +'<div class="stat-card" data-emoji="⏳" style="background:linear-gradient(135deg,#FFD166,#FFBA08)"><div class="stat-card-num" style="color:var(--dark)">'+pending+'</div><div class="stat-card-label" style="color:rgba(30,41,59,.7)">Pendientes</div></div>'
    +'</div>'
    +'<div class="sec-header"><span class="sec-icon">✈️</span><span class="sec-title">Próximos viajes</span><span class="sec-badge">'+TRIPS.length+'</span></div>';
  TRIPS.forEach(function(t){
    var allArr=salesArr();
    var occ=BUSES.reduce(function(a,b){return a+occupied(t.id,b.id).length;},0);
    var cap=BUSES.reduce(function(a,b){return a+b.seats;},0);
    var pct=Math.round((occ/cap)*100);
    var myOcc=0;
    if(currentSeller!=="all"){myOcc=allArr.filter(function(s){return s.tripId===t.id&&s.status!=="Cancelado"&&s.seller===currentSeller;}).reduce(function(a,s){var ss=Array.isArray(s.seats)?s.seats:[s.seat];return a+ss.length;},0);}
    var cp=t.prices.nino?" · Niños €"+t.prices.nino:"";
    html+='<div class="trip-card" onclick="pickTrip('+t.id+')">'
      +'<div class="trip-card-accent" style="background:'+t.color+'"></div>'
      +'<div class="trip-card-inner">'
      +'<div class="trip-card-top">'
      +'<div><div class="trip-card-dest">'+t.emoji+' '+t.dest+'</div><div class="trip-card-date">'+t.day+' '+fmtD(t.date)+'</div><div class="trip-card-info">'+t.info+'</div></div>'
      +'<div class="trip-card-prices"><div class="trip-card-price" style="color:'+t.color+'">€'+t.prices.adulto+'</div><div class="trip-card-child">'+cp+'</div></div>'
      +'</div>'
      +'<div class="trip-card-bar"><div class="trip-card-fill" style="background:'+t.color+';width:'+pct+'%"></div></div>'
      +'<div class="trip-card-stats">'
      +'<span class="trip-card-stat-txt">'+occ+' de '+cap+' plazas'+(currentSeller!=="all"?' · Mis: '+myOcc:'')+'</span>'
      +'<span class="trip-card-badge" style="background:'+t.color+'22;color:'+t.color+'">'+pct+'% ocupado</span>'
      +'</div>'
      +'</div></div>';
  });
  return html;
}

  });
  html+='</div>';
  if(selBus) html+='<button class="btn-primary" onclick="showView(\'seatMap\',true)">🪑 Ver plazas de '+selBus.name+'</button>';
  return html;
}

function renderSeatMap(){

    +'<div class="seat-map-header">'
    +'<div class="seat-map-title">'+selTrip.emoji+' '+selTrip.dest+' · '+selBus.name+'</div>'
    +'<div class="seat-map-sub">'+total+' plazas · '+occ.length+' ocupadas · '+(total-occ.length)+' libres</div>'
    +'<div class="seat-map-hint">Toca las plazas que quieras reservar 👇</div>'
    +'</div>'
    +'<div class="bus-visual-front">🚌 &nbsp; C O N D U C T O R</div>'
    +'<div class="bus-visual-body">';

// ── CONFIRM SALE ─────────────────────────────────────────
function confirmSale(totalPrecio){
  var client=(document.getElementById("fClient")||{}).value||"";
  var phone=(document.getElementById("fPhone")||{}).value||"";
  var email=(document.getElementById("fEmail")||{}).value||"";
  var senal=parseFloat((document.getElementById("fSenal")||{}).value)||0;
  var obs=(document.getElementById("fObs")||{}).value||"";
  client=client.trim();phone=phone.trim();obs=obs.trim();
  if(!client||!phone){toast("⚠️ Completa nombre y teléfono","warn");return;}
  if(!selDeparture){toast("⚠️ Selecciona el punto de salida","warn");return;}
  if(selSeats.length===0){toast("⚠️ Selecciona al menos una plaza","warn");return;}
  var metalico=Math.max(0,totalPrecio-senal);
  syncUI("syncing","Guardando...");
  var ns={tripId:selTrip.id,busId:selBus.id,seats:selSeats.slice(),seat:selSeats[0],numSeats:selSeats.length,client:client,phone:phone,email:email,payment:selPayment,senal:senal,metalico:metalico,total:totalPrecio,priceType:selPriceType,departure:selDeparture,seller:sellerForm,obs:obs,status:senal>=totalPrecio?"Pagado":"Pendiente",date:new Date().toISOString().split("T")[0],ts:Date.now()};
  salesRef.push(ns).then(function(ref){
    syncUI("online","En línea ✓");
    ns._key=ref.key;
    toast("✅ Reserva guardada! Generando PDF...");
    setTimeout(function(){generatePDF(ns);},600);
    selSeats=[];selTrip=null;selBus=null;selPriceType="adulto";selDeparture=null;
    showView("dashboard");
  }).catch(function(){syncUI("error","Error");toast("❌ Error al guardar","error");});
}

    +'</div>'

    +'<div class="metalico-card">'
    +'<div class="metalico-card-title">💵 A pagar en metálico al subir al bus</div>'
    +'<div class="metalico-amount">€'+s.metalico+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:#065F46;margin-top:4px">'+s.client+' · 📞 '+s.phone+'</div>'
    +'<div style="font-size:11px;font-weight:600;color:#047857;margin-top:2px">'+b.name+' · '+dep.full+' · '+hora+'h · '+t.day+' '+fmtD(t.date)+'</div>'
    +'</div>';

  if(s.obs&&s.obs.trim()){
    html+='<div class="info-card"><div class="info-card-title">📌 Observaciones</div><div class="obs-display">'+s.obs+'</div></div>';
  }

  html+='<div class="action-row">'
    +'<button class="btn-purple" onclick="regenPDF(\''+detailKey+'\')">📄 PDF</button>';
  if(s.status!=="Cancelado"){
    if(s.status!=="Pagado") html+='<button class="btn-green" onclick="updStatus(\''+detailKey+'\',\'Pagado\')">✓ Pagado</button>';
    if(s.status!=="Pendiente") html+='<button class="btn-amber" onclick="updStatus(\''+detailKey+'\',\'Pendiente\')">⏳ Pdte</button>';
    html+='<button class="btn-red" onclick="updStatus(\''+detailKey+'\',\'Cancelado\')">✕ Cancelar</button>';
  }
  html+='</div>';
  return html;
}
function regenPDF(key){var s=Object.assign({},sales[key]);s._key=key;generatePDF(s);}
function updStatus(key,status){syncUI("syncing","Guardando...");db.ref("sales/"+key).update({status:status}).then(function(){syncUI("online","En línea ✓");toast("Estado: "+status);showView("detail",true);}).catch(function(){toast("Error","error");});}

// ── PROFILE ──────────────────────────────────────────────
function renderProfile(){
  var html='<div class="sec-header"><span class="sec-icon">👤</span><span class="sec-title">Perfiles</span></div>';
  Object.values(SELLERS).forEach(function(seller){
    var arr=salesArr().filter(function(s){return s.seller===seller.id;});
    var active=arr.filter(function(s){return s.status!=="Cancelado";});
    var totalSenal=active.reduce(function(a,s){return a+(s.senal||0);},0);
    var totalMet=active.reduce(function(a,s){return a+(s.metalico||0);},0);
    var totalPlazas=active.reduce(function(a,s){var ss=Array.isArray(s.seats)?s.seats:[s.seat];return a+ss.length;},0);
    var pagadas=active.filter(function(s){return s.status==="Pagado";}).length;
    var pendientes=active.filter(function(s){return s.status==="Pendiente";}).length;
    html+='<div class="profile-hero" style="background:'+seller.grad+'">'
      +'<div class="profile-avatar-big">'+seller.emoji+'</div>'
      +'<div class="profile-hero-name">'+seller.name+'</div>'
      +'<div class="profile-hero-role">Vendedor · Yo Me Voy Excursiones</div>'
      +'<div class="profile-stats-grid">'
      +'<div class="profile-stat-card"><div class="profile-stat-num">€'+totalSenal+'</div><div class="profile-stat-lbl">Señales</div></div>'
      +'<div class="profile-stat-card"><div class="profile-stat-num">€'+totalMet+'</div><div class="profile-stat-lbl">Pendiente</div></div>'
      +'<div class="profile-stat-card"><div class="profile-stat-num">'+totalPlazas+'</div><div class="profile-stat-lbl">Plazas</div></div>'
      +'<div class="profile-stat-card"><div class="profile-stat-num">'+active.length+'</div><div class="profile-stat-lbl">Reservas</div></div>'
      +'<div class="profile-stat-card"><div class="profile-stat-num">'+pagadas+'</div><div class="profile-stat-lbl">Pagadas</div></div>'
      +'<div class="profile-stat-card"><div class="profile-stat-num">'+pendientes+'</div><div class="profile-stat-lbl">Pendientes</div></div>'
      +'</div></div>'
      +'<div class="info-card">'
      +'<div class="info-card-title">Últimas reservas de '+seller.name+'</div>';
    var recent=arr.slice(0,5);
    if(!recent.length)html+='<div style="text-align:center;padding:16px;color:#94A3B8;font-size:13px;font-weight:600">Sin reservas aún 🎫</div>';
    recent.forEach(function(s){
      var t=getTrip(s.tripId);
      var ss=Array.isArray(s.seats)?s.seats:[s.seat];
      html+='<div class="recent-sale-row">'
        +'<div><div style="font-size:13px;font-weight:800;color:var(--dark)">'+s.client+'</div>'
        +'<div style="font-size:10px;font-weight:600;color:var(--gray);margin-top:1px">'+t.emoji+' '+t.dest+' · '+ss.length+'pax</div></div>'
        +'<div style="text-align:right">'+stBadge(s.status)+'<div style="font-size:12px;font-weight:900;color:var(--sun);margin-top:3px">€'+s.senal+'</div></div>'
        +'</div>';
    });
    html+='</div>';
  });
  return html;
}
