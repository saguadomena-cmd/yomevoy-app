  .trips-list.open { max-height: 800px; overflow-y: auto; }

  .trip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .trip-dest { font-size: 12px; color: #F0EDE6; }
  .trip-date { font-size: 10px; color: #8B8680; margin-top: 1px; }
  .trip-price-main { font-size: 12px; font-weight: bold; color: #E8A838; }

  .tour-name { font-size: 13px; font-weight: bold; color: #F0EDE6; }
  .tour-meta { font-size: 10px; color: #8B8680; margin-top: 2px; line-height: 1.5; }
  .badge { display: inline-block; border-radius: 20px; padding: 2px 7px; font-size: 9px; letter-spacing: 1px; }
  .progress-bar { background: rgba(255,255,255,0.05); border-radius: 4px; height: 3px; margin-top: 7px; }
  .progress-fill { height: 3px; border-radius: 4px; }
  .progress-label { font-size: 9px; color: #6B6660; margin-top: 2px; }

  .btn-blue { background: linear-gradient(135deg, #3A7BD5, #2563eb); color: #fff; }

</style>

// ─── HELPERS ─────────────────────────────────────────────
function getTrip(id){ return TRIPS.find(function(t){return t.id===id;}); }
function getBus(id){ return BUSES.find(function(b){return b.id===id;}); }
function salesArr(){
  return Object.keys(sales).map(function(k){
    var s=Object.assign({},sales[k]); s._key=k; return s;
  }).sort(function(a,b){return (b.ts||0)-(a.ts||0);});
}
function occupied(tripId,busId){
  return salesArr().filter(function(s){return s.tripId===tripId&&s.busId===busId&&s.status!=="Cancelado";})
    .reduce(function(a,s){var seats=Array.isArray(s.seats)?s.seats:[s.seat];return a.concat(seats);},[]); 
}
function stColor(s){ return s==="Pagado"?"#22c55e":s==="Pendiente"?"#f59e0b":"#ef4444"; }
function bdg(txt,col){ return '<span class="badge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44">'+txt+'</span>'; }
function fmtD(d){ var p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function setSyncDot(st){ var d=document.getElementById("syncDot"); if(d) d.className="sync-dot "+st; }
function updateRevenue(){
  var arr=salesArr();
  if(currentSeller!=="all") arr=arr.filter(function(s){return s.seller===currentSeller;});
  var t=arr.filter(function(s){return s.status!=="Cancelado";}).reduce(function(a,s){return a+(s.senal||0);},0);
  var el=document.getElementById("totalRevenue"); if(el) el.textContent="€"+t;
}
function toast(msg,type){
  var t=document.createElement("div"); t.className="toast";
  t.style.background=type==="error"?"#ef4444":"#22c55e"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity="0";setTimeout(function(){t.remove();},400);},3000);
}
function sellerTag(seller){
  if(seller==="jose") return '<span class="seller-tag-jose">🔵 Jose Ariel</span>';
  if(seller==="cris") return '<span class="seller-tag-cris">🟣 Cris</span>';
  return "";
}
function getDepartureInfo(key){ return DEPARTURES.find(function(d){return d.id===key;})||{full:key,icon:"📍",name:key}; }

    +'<div class="stat-card" style="background:linear-gradient(135deg,#22c55e18,#22c55e08);border:1px solid #22c55e30"><div class="stat-num" style="color:#22c55e">€'+totalMet+'</div><div class="stat-label">Pdte. metálico</div></div>'

    +'</div><div class="section-title">Próximos viajes</div>';
  TRIPS.forEach(function(t){
    var allArr=salesArr();

    var occ=BUSES.reduce(function(a,b){return a+occupied(t.id,b.id).length;},0);

    var cp=t.prices.nino?" · Niños €"+t.prices.nino:"";

    var dep = getDepartureInfo(saleData.departure);
    var seats = Array.isArray(saleData.seats)?saleData.seats:[saleData.seat];
    var seller = SELLERS[saleData.seller]||{name:"—"};

    // Header background
    doc.setFillColor(15,17,23);
    doc.rect(0,0,210,297,'F');

    // Gold header bar
    doc.setFillColor(232,168,56);
    doc.rect(0,0,210,28,'F');

    // Title
    doc.setTextColor(15,17,23);
    doc.setFontSize(18);
    doc.setFont("helvetica","bold");
    doc.text("YO ME VOY EXCURSIONES",105,11,{align:"center"});
    doc.setFontSize(11);
    doc.text("BILLETE DE RESERVA",105,20,{align:"center"});

    // Ticket ID
    doc.setFillColor(26,29,46);
    doc.roundedRect(10,33,190,18,3,3,'F');
    doc.setTextColor(232,168,56);
    doc.setFontSize(9);

// ─── CONFIRM SALE ─────────────────────────────────────────
function confirmSale(totalPrecio){
  var client=document.getElementById("fClient").value.trim();
  var phone=document.getElementById("fPhone").value.trim();
  var email=document.getElementById("fEmail").value.trim();
  var senal=parseFloat(document.getElementById("fSenal").value)||0;
  var obs=document.getElementById("fObs")?document.getElementById("fObs").value.trim():"";
  if(!client||!phone){ toast("Completa nombre y teléfono","error"); return; }
  if(!selDeparture){ toast("Selecciona el punto de salida","error"); return; }
  if(!sellerForm){ toast("Selecciona el vendedor","error"); return; }
  if(selSeats.length===0){ toast("Selecciona al menos una plaza","error"); return; }
  var metalico=Math.max(0,totalPrecio-senal);
  setSyncDot("syncing");
  var newSale={
    tripId:selTrip.id, busId:selBus.id,
    seats:selSeats.slice(), seat:selSeats[0], numSeats:selSeats.length,
    client:client, phone:phone, email:email,
    payment:selPayment, senal:senal, metalico:metalico, total:totalPrecio,
    priceType:selPriceType, departure:selDeparture,
    seller:sellerForm, obs:obs,
    status:senal>=totalPrecio?"Pagado":"Pendiente",
    date:new Date().toISOString().split("T")[0],
    ts:Date.now()
  };
  salesRef.push(newSale).then(function(ref){
    setSyncDot("online");
    newSale._key=ref.key;
    toast("✅ Reserva guardada. Generando PDF...");
    setTimeout(function(){ generatePDF(newSale); },500);
    selSeats=[]; selTrip=null; selBus=null; selPriceType="adulto"; selDeparture=null; selObs="";
    showView("dashboard");
  }).catch(function(){ setSyncDot("error"); toast("Error al guardar","error"); });
}

// ─── SALES LIST ───────────────────────────────────────────
function renderSales(){
  var arr=salesArr().filter(function(s){
    var tm=filterTrip==="all"||s.tripId===parseInt(filterTrip);
    var sm=filterStatus==="all"||s.status===filterStatus;
    var sv=filterSeller==="all"||s.seller===filterSeller;
    return tm&&sm&&sv;
  });
  var html='<div class="section-title">Historial de Reservas</div>'
    +'<div class="filter-row"><div class="filter-chip '+(filterTrip==="all"?"on":"off")+'" onclick="setFT(\'all\')">TODAS</div>';
  TRIPS.forEach(function(t){var sh=t.dest.split("—")[0].trim().split(" ")[0];html+='<div class="filter-chip '+(filterTrip==t.id?"on":"off")+'" onclick="setFT(\''+t.id+'\')">'+sh+'</div>';});
  html+='</div><div class="filter-row">';
  ["all","Pagado","Pendiente","Cancelado"].forEach(function(s){html+='<div class="filter-chip '+(filterStatus===s?"on":"off")+'" onclick="setFS(\''+s+'\')">'+(s==="all"?"TODOS":s.toUpperCase())+'</div>';});
  html+='</div><div class="filter-row">';
  [{id:"all",l:"👥 TODOS"},{id:"jose",l:"🔵 JOSE"},{id:"cris",l:"🟣 CRIS"}].forEach(function(o){html+='<div class="filter-chip '+(filterSeller===o.id?"on":"off")+'" onclick="setFV(\''+o.id+'\')">'+o.l+'</div>';});
  html+='</div>';
  if(!arr.length){html+='<div class="empty">Sin reservas para este filtro</div>';return html;}
  arr.forEach(function(s){
    var t=getTrip(s.tripId),b=getBus(s.busId);
    var seats=Array.isArray(s.seats)?s.seats:[s.seat];
    var dep=getDepartureInfo(s.departure);
    html+='<div class="sale-row" onclick="openDetail(\''+s._key+'\')">'
      +'<div style="flex:1">'
      +'<div style="display:flex;gap:5px;align-items:center;margin-bottom:2px;flex-wrap:wrap">'
      +'<span style="font-size:10px;color:#E8A838;font-family:monospace">#'+s._key.substr(-6).toUpperCase()+'</span>'
      +bdg(s.status,stColor(s.status))
      +sellerTag(s.seller)
      +'</div>'
      +'<div style="font-size:12px;color:#F0EDE6">'+s.client+'</div>'
      +'<div style="font-size:9px;color:#6B6660">'+t.dest.split("—")[0].trim()+' · '+b.name+' · '+dep.icon+dep.name+' · '+seats.length+'pax</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div style="font-size:10px;color:#E8A838">Señal: €'+s.senal+'</div>'
      +'<div style="font-size:10px;color:#22c55e">Bus: €'+s.metalico+'</div>'
      +'</div></div>';
  });
  return html;
}

  if(s.obs&&s.obs.trim()){

    if(s.status!=="Pendiente") html+='<button class="btn btn-amber" onclick="updStatus(\''+detailKey+'\',\'Pendiente\')">⏳ Pdte</button>';

function regeneratePDF(key){
  var s=Object.assign({},sales[key]); s._key=key;
  generatePDF(s);
}

function updStatus(key,status){
  setSyncDot("syncing");
  db.ref("sales/"+key).update({status:status}).then(function(){
    setSyncDot("online"); toast("Estado: "+status); showView("detail",true);
  }).catch(function(){toast("Error","error");});
}

// ─── PROFILE ──────────────────────────────────────────────
function renderProfile(){
  var arr=salesArr();
  var html='<div class="section-title">Perfiles de vendedores</div>';
  Object.values(SELLERS).forEach(function(seller){
    var myArr=arr.filter(function(s){return s.seller===seller.id;});
    var active=myArr.filter(function(s){return s.status!=="Cancelado";});
    var totalSenal=active.reduce(function(a,s){return a+(s.senal||0);},0);
    var totalMet=active.reduce(function(a,s){return a+(s.metalico||0);},0);
    var totalRes=active.length;
    var pagadas=active.filter(function(s){return s.status==="Pagado";}).length;
    var pendientes=active.filter(function(s){return s.status==="Pendiente";}).length;
    var totalPlazas=active.reduce(function(a,s){var seats=Array.isArray(s.seats)?s.seats:[s.seat];return a+seats.length;},0);
    html+='<div class="profile-card">'
      +'<div class="profile-avatar">'+seller.emoji+'</div>'
      +'<div class="profile-name">'+seller.name+'</div>'
      +'<div class="profile-role">Vendedor · Yo Me Voy Excursiones</div>'
      +'<div class="profile-stats">'
      +'<div class="profile-stat"><div class="profile-stat-num" style="color:'+seller.color+'">€'+totalSenal+'</div><div class="profile-stat-label">Señales</div></div>'
      +'<div class="profile-stat"><div class="profile-stat-num" style="color:#22c55e">€'+totalMet+'</div><div class="profile-stat-label">Pendiente</div></div>'
      +'<div class="profile-stat"><div class="profile-stat-num" style="color:#F0EDE6">'+totalPlazas+'</div><div class="profile-stat-label">Plazas</div></div>'
      +'<div class="profile-stat"><div class="profile-stat-num" style="color:'+seller.color+'">'+totalRes+'</div><div class="profile-stat-label">Reservas</div></div>'
      +'<div class="profile-stat"><div class="profile-stat-num" style="color:#22c55e">'+pagadas+'</div><div class="profile-stat-label">Pagadas</div></div>'
      +'<div class="profile-stat"><div class="profile-stat-num" style="color:#f59e0b">'+pendientes+'</div><div class="profile-stat-label">Pendientes</div></div>'
      +'</div>'
      // Recent sales
      +'<div style="margin-top:12px;text-align:left">'
      +'<div style="font-size:9px;color:#E8A838;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px">Últimas reservas</div>';
    var recent=myArr.slice(0,4);
    if(!recent.length) html+='<div style="font-size:11px;color:#6B6660;text-align:center;padding:10px">Sin reservas aún</div>';
    recent.forEach(function(s){
      var t=getTrip(s.tripId);
      var seats=Array.isArray(s.seats)?s.seats:[s.seat];
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">'
        +'<div><div style="font-size:11px;color:#F0EDE6">'+s.client+'</div>'
        +'<div style="font-size:9px;color:#6B6660">'+t.dest.split("—")[0].trim()+' · '+seats.length+'pax</div></div>'
